name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  # 不让 electron postinstall 在 CI 上下 Electron binary(120MB,我们 CI 阶段只跑 lint/typecheck/test,不起 Electron)
  ELECTRON_SKIP_BINARY_DOWNLOAD: '1'

jobs:
  lint:
    name: lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        # version 不写,从 package.json packageManager 字段读(避免版本写两次冲突)
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint

  typecheck:
    name: typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        # version 不写,从 package.json packageManager 字段读(避免版本写两次冲突)
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck

  test:
    name: test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        # version 不写,从 package.json packageManager 字段读(避免版本写两次冲突)
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm test

  # T19 — mac 平台 smoke：验 macOS 能编译 / 测试 / 启动不崩(arm64 + x64)。
  # signed+notarized package + 录真实 PCM 的完整 smoke 留 T70(依赖打包链 + 签名 secrets,
  # 且 CI 标准 runner 无音频设备 / 无 TCC)。
  build-mac:
    name: build-mac (${{ matrix.arch }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            arch: arm64
          - os: macos-13
            arch: x64
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    env:
      # 覆盖顶部全局 SKIP：这个 job 要起 Electron 跑启动 smoke，必须下 binary。
      # 用空串而非 '0' —— @electron/get 检测的是"是否 set 非空值"，'0' 也会被当成跳过。
      ELECTRON_SKIP_BINARY_DOWNLOAD: ''
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm test
      - name: launch smoke (LAZY_SMOKE=1 起 app → app ready → 自动退出)
        run: LAZY_SMOKE=1 pnpm exec electron-vite preview
        timeout-minutes: 3
